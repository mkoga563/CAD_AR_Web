<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width,height=device-height,initial-scale=1,viewport-fit=cover">

<meta
    name="theme-color"
    content="#222222">

<title>CAD AR System Version 3.1</title>

<!-- =====================================================
    CSS
====================================================== -->

<link
    rel="stylesheet"
    href="style.css">

<!-- =====================================================
    OpenCV
====================================================== -->

<script
    src="./lib/opencv.js">
</script>

<!-- =====================================================
    QRCode
====================================================== -->

<script
    src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
</script>

</head>

<body>

<div id="app">

<!-- =====================================================
    Top Bar
====================================================== -->

<div id="topBar">

    <input
        id="partNo"
        type="text"
        placeholder="部品番号">

    <button id="loadButton">

        CAD読込

    </button>

    <label>

        <input
            id="markerVisible"
            type="checkbox"
            checked>

        穴マーカー表示

    </label>

    <button id="cameraButton">

        カメラ切替

    </button>

    <button id="debugButton">

        Debug

    </button>

</div>

<!-- =====================================================
    Camera
====================================================== -->

<video
    id="video"
    autoplay
    playsinline
    muted>
</video>

<!-- =====================================================
    AR Canvas
====================================================== -->

<canvas
    id="canvas">
</canvas>

<!-- =====================================================
    QR Code
====================================================== -->

<div id="qrcode">
</div>

<!-- =====================================================
    FPS
====================================================== -->

<div id="fps">

0 FPS

</div>

<!-- =====================================================
    Version
====================================================== -->

<div id="version">

Version 3.1

</div>

<!-- =====================================================
    Status
====================================================== -->

<div id="status">

待機中

</div>

<!-- =====================================================
    Debug
====================================================== -->

<div id="debug">
</div>
<!-- =====================================================
    Loading Overlay
====================================================== -->

<div
    id="loadingOverlay"
    class="overlay">

    <div class="overlayBox">

        <div class="spinner">
        </div>

        <div id="loadingText">

            OpenCV 読み込み中...

        </div>

    </div>

</div>

<!-- =====================================================
    Error Dialog
====================================================== -->

<div
    id="errorDialog"
    class="dialog"
    style="display:none;">

    <div class="dialogBox">

        <h2>

            エラー

        </h2>

        <div id="errorMessage">
        </div>

        <button id="closeError">

            OK

        </button>

    </div>

</div>

<!-- =====================================================
    Camera Permission
====================================================== -->

<div
    id="permissionMessage"
    style="display:none;">

    カメラの使用を許可してください。

</div>

<!-- =====================================================
    OpenCV Status
====================================================== -->

<div
    id="opencvStatus"
    style="display:none;">

    OpenCV 初期化中...

</div>

<!-- =====================================================
    JavaScript
====================================================== -->

<script type="module">

import { APP } from "./js/config.js";
import { AppState } from "./js/state.js";

/* グローバル公開（必要なものだけ） */

window.APP = APP;
window.AppState = AppState;

/* -------------------------------
   起動
-------------------------------- */

window.addEventListener("load", () => {

    const overlay =
        document.getElementById("loadingOverlay");

    if (overlay) {

        overlay.style.display = "none";

    }

});

/* -------------------------------
   エラー表示
-------------------------------- */

window.addEventListener("error", (event) => {

    console.error(event);

    const dialog =
        document.getElementById("errorDialog");

    const message =
        document.getElementById("errorMessage");

    if (dialog && message) {

        message.textContent =
            event.message;

        dialog.style.display = "flex";

    }

});

/* -------------------------------
   エラーダイアログ閉じる
-------------------------------- */

document
.getElementById("closeError")
.addEventListener("click", () => {

    document
    .getElementById("errorDialog")
    .style.display = "none";

});

</script>

<!-- =====================================================
    Main App
====================================================== -->

<script
    type="module"
    src="./js/app.js">
</script>

</div>

</body>

</html>
