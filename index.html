<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">

<meta
    name="theme-color"
    content="#222222">

<title>CAD AR System</title>

<link
    rel="stylesheet"
    href="style.css">

<!-- OpenCV -->

<script
    async
    src="lib/opencv.js">
</script>
<style>

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#111;

    color:#FFF;

    font-family:
        "Segoe UI",
        sans-serif;

}

#app{

    position:relative;

    width:100vw;
    height:100vh;

    overflow:hidden;

}

#video{

    position:absolute;

    left:0;
    top:0;

    width:100%;
    height:100%;

    object-fit:cover;

    z-index:1;

}

#canvas{

    position:absolute;

    left:0;
    top:0;

    width:100%;
    height:100%;

    z-index:2;

    pointer-events:none;

}

#topBar{

    position:absolute;

    left:10px;
    top:10px;

    z-index:10;

    display:flex;

    flex-wrap:wrap;

    gap:8px;

    align-items:center;

    background:rgba(0,0,0,.55);

    padding:10px;

    border-radius:8px;

}

input{

    width:160px;

    padding:8px;

    font-size:18px;

}

button{

    padding:8px 18px;

    font-size:18px;

    cursor:pointer;

}

label{

    font-size:16px;

}

#status{

    position:absolute;

    left:10px;

    bottom:10px;

    z-index:10;

    background:rgba(0,0,0,.55);

    padding:10px 16px;

    border-radius:6px;

    font-size:18px;

}

#fps{

    position:absolute;

    right:15px;

    top:15px;

    z-index:10;

    font-size:16px;

    background:rgba(0,0,0,.5);

    padding:6px 10px;

    border-radius:6px;

}

#version{

    position:absolute;

    right:15px;

    top:50px;

    z-index:10;

    font-size:15px;

    background:rgba(0,0,0,.5);

    padding:6px 10px;

    border-radius:6px;

}

#debug{

    position:absolute;

    left:10px;

    right:10px;

    bottom:60px;

    max-height:180px;

    overflow:auto;

    z-index:10;

    font-size:12px;

    font-family:Consolas,monospace;

    background:rgba(0,0,0,.65);

    padding:10px;

    border-radius:6px;

    display:none;

}

.dark{

    background:#000;

}
/* =====================================================
    Overlay
====================================================== */

.overlay{

    position:absolute;

    left:0;
    top:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.75);

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:100;

}

.overlayBox{

    text-align:center;

    color:white;

    font-size:22px;

}

.spinner{

    width:60px;

    height:60px;

    margin:auto;

    border:6px solid #444;

    border-top:6px solid #00c8ff;

    border-radius:50%;

    animation:spin 1s linear infinite;

}

@keyframes spin{

    from{

        transform:rotate(0deg);

    }

    to{

        transform:rotate(360deg);

    }

}

.dialog{

    position:absolute;

    left:0;

    top:0;

    width:100%;

    height:100%;

    display:flex;

    justify-content:center;

    align-items:center;

    background:rgba(0,0,0,.6);

    z-index:150;

}

.dialogBox{

    background:white;

    color:black;

    padding:30px;

    border-radius:10px;

    min-width:320px;

    text-align:center;

}

#permissionMessage,
#opencvStatus{

    position:absolute;

    left:50%;

    transform:translateX(-50%);

    top:80px;

    background:#ffeb3b;

    color:#000;

    padding:10px 20px;

    border-radius:8px;

    z-index:50;

}
</style>

</head>

<body>

<div id="app">
<!-- =====================================================
    Top Bar
====================================================== -->

<div id="topBar">

    <input
        id="partNo"
        type="text"
        placeholder="部品番号">

    <button id="loadButton">

        CAD読込

    </button>

    <label>

        <input
            id="markerVisible"
            type="checkbox"
            checked>

        穴マーカー表示

    </label>

    <button id="cameraButton">

        カメラ切替

    </button>

    <button id="debugButton">

        Debug

    </button>

</div>

<!-- =====================================================
    Camera
====================================================== -->

<video
    id="video"
    autoplay
    playsinline
    muted>
</video>

<!-- =====================================================
    AR Canvas
====================================================== -->

<canvas id="canvas">
</canvas>

<!-- =====================================================
    QR Code
====================================================== -->

<div
    id="qr"

    style="
        position:absolute;
        right:15px;
        bottom:15px;
        z-index:10;
        background:white;
        padding:8px;
        border-radius:8px;
    ">
</div>

<!-- =====================================================
    FPS
====================================================== -->

<div id="fps">

0 FPS

</div>

<!-- =====================================================
    Version
====================================================== -->

<div id="version">

Version 3.0

</div>

<!-- =====================================================
    Status
====================================================== -->

<div id="status">

待機中

</div>

<!-- =====================================================
    Debug
====================================================== -->

<div id="debug">
</div>
<!-- =====================================================
    Loading Overlay
====================================================== -->

<div id="loadingOverlay" class="overlay">

    <div class="overlayBox">

        <div class="spinner"></div>

        <div id="loadingText">

            OpenCV 読み込み中...

        </div>

    </div>

</div>

<!-- =====================================================
    Error Dialog
====================================================== -->

<div id="errorDialog" class="dialog" style="display:none;">

    <div class="dialogBox">

        <h2>エラー</h2>

        <div id="errorMessage">

        </div>

        <button id="closeError">

            OK

        </button>

    </div>

</div>

<!-- =====================================================
    Camera Permission
====================================================== -->

<div id="permissionMessage"

     style="display:none;">

    カメラの使用を許可してください。

</div>

<!-- =====================================================
    OpenCV Status
====================================================== -->

<div id="opencvStatus"

     style="display:none;">

    OpenCV 初期化中...

</div>
<!-- =====================================================
    JavaScript
====================================================== -->

<script type="module">

import { APP } from "./config.js";
import { AppState } from "./state.js";
import { camera } from "./camera.js";
import { marker } from "./marker.js";

window.APP = APP;
window.AppState = AppState;
window.camera = camera;
window.marker = marker;

window.addEventListener("load", () => {

    const overlay =
        document.getElementById("loadingOverlay");

    if (overlay) {

        overlay.style.display = "none";

    }

});

window.addEventListener("error", (event) => {

    const dialog =
        document.getElementById("errorDialog");

    const message =
        document.getElementById("errorMessage");

    if (dialog && message) {

        message.textContent =
            event.message;

        dialog.style.display = "flex";

    }

});

const closeButton =
    document.getElementById("closeError");

if (closeButton) {

    closeButton.onclick = () => {

        document.getElementById(
            "errorDialog"
        ).style.display = "none";

    };

}

</script>

<!-- メインアプリ -->

<script
    type="module"
    src="./app.js">
</script>

</div>

</body>

</html>
