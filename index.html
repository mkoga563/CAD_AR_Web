<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="CAD AR System">

    <meta name="theme-color" content="#1976D2">

    <title>CAD AR System</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- PWA（後で使用） ->
    <!-- <link rel="manifest" href="manifest.json"> -->

</head>

<body>

    <!-- ==========================
         Header
    =========================== -->

    <header id="header">

        <div id="titleArea">

            <h1>CAD AR System</h1>

            <div id="version">
                Version 2.0
            </div>

        </div>

        <div id="qrcode"></div>

    </header>


    <!-- ==========================
         Main
    =========================== -->

    <main id="main">

        <!-- 操作エリア -->
        <section id="controlPanel">

            <label for="partNo">型番</label>

            <input
                id="partNo"
                type="text"
                placeholder="例：A1001"
                autocomplete="off">

            <button id="loadBtn">読込み</button>

        </section>


        <!-- 状態表示 -->
        <section id="statusPanel">

            <div>
                状態：
                <span id="statusText">初期化中...</span>
            </div>

            <div>
                FPS：
                <span id="fps">0</span>
            </div>

        </section>


        <!-- カメラ表示 -->
        <section id="cameraArea">

            <video
                id="video"
                autoplay
                muted
                playsinline>
            </video>

            <canvas id="canvas"></canvas>

        </section>

    </main>


    <!-- ==========================
         Footer
    =========================== -->

    <footer id="footer">

        CAD AR System © 2026

    </footer>


    <!-- ==========================
         Libraries
    =========================== -->

    <!-- QRCode（軽量なのでCDN or ローカルどちらでもOK） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- OpenCV（重いのでローカル配置） -->
    <script async src="./lib/opencv.js"></script>


    <!-- Main App -->
    <script type="module" src="js/app.js"></script>

    <div id="debug"
     style="
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        max-height: 40%;
        overflow: auto;
        background: rgba(0,0,0,0.85);
        color: #00ff00;
        font-size: 12px;
        z-index: 9999;
        padding: 5px;
     ">
    </div>

</body>

</html>
